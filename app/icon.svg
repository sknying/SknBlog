<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SknBlog 樱月小屋标志</title>
  <desc id="desc">圆形粉紫渐变标志，包含月牙、樱花、小屋与水波。</desc>
  <defs>
    <linearGradient id="ring" x1="70" y1="56" x2="454" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9fc5"/><stop offset="0.48" stop-color="#c99bea"/><stop offset="1" stop-color="#86a8f3"/>
    </linearGradient>
    <linearGradient id="moon" x1="114" y1="74" x2="282" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffafd0"/><stop offset="0.55" stop-color="#d7a6ec"/><stop offset="1" stop-color="#8fa9ee"/>
    </linearGradient>
    <linearGradient id="roof" x1="174" y1="247" x2="351" y2="367" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8f8ae1"/><stop offset="1" stop-color="#647fd0"/>
    </linearGradient>
    <linearGradient id="water" x1="92" y1="366" x2="420" y2="424" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ec2f5"/><stop offset="0.5" stop-color="#b69ce8"/><stop offset="1" stop-color="#f4a6c5"/>
    </linearGradient>
    <radialGradient id="bg" cx="38%" cy="25%" r="75%">
