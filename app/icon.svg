        <use href="#petal" transform="rotate(72) translate(0 -8) scale(.72)"/>
        <use href="#petal" transform="rotate(144) translate(0 -8) scale(.72)"/>
        <use href="#petal" transform="rotate(216) translate(0 -8) scale(.72)"/>
        <use href="#petal" transform="rotate(288) translate(0 -8) scale(.72)"/>
      </g>
      <circle r="5.5" fill="#ffd86f"/><circle r="2.2" fill="#fff8cf"/>
    </symbol>
  </defs>

